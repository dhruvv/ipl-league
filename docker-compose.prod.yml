services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-player_auction}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    restart: "no"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-player_auction}"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-player_auction}"
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      CRICAPI_KEY: ${CRICAPI_KEY:-}
      CRICAPI_FANTASY_RULESET_ID: ${CRICAPI_FANTASY_RULESET_ID:-}
      # Set to "true" to use only scorecard math (scoring.ts), no match_points
      FANTASY_POINTS_LOCAL_ONLY: ${FANTASY_POINTS_LOCAL_ONLY:-}
      SCORING_POLL_TZ: ${SCORING_POLL_TZ:-America/Los_Angeles}
      SCORING_POLL_WINDOW_START: ${SCORING_POLL_WINDOW_START:-03:00}
      SCORING_POLL_WINDOW_END: ${SCORING_POLL_WINDOW_END:-16:00}
      SCORING_POLL_IDLE_OUTSIDE_WINDOW_MS: ${SCORING_POLL_IDLE_OUTSIDE_WINDOW_MS:-3600000}
      SCORING_SYNC_SECRET: ${SCORING_SYNC_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
